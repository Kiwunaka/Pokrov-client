name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  source-import:
    name: Source import and public tree checks
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python test dependencies
        run: python -m pip install pytest

      - name: Run source-import tests
        run: python -m pytest tests/test_source_import.py

      - name: Verify clean clone source boundary
        shell: pwsh
        run: .\scripts\verify-clean-clone.ps1 -Source . -SkipFlutterTests

  flutter:
    name: Flutter analyze and tests
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Bootstrap workspace
        shell: pwsh
        run: .\scripts\bootstrap-workspace.ps1

      - name: Analyze shared app shell
        working-directory: packages/app_shell
        run: flutter analyze

      - name: Run workspace tests
        shell: pwsh
        run: .\scripts\run-tests.ps1
