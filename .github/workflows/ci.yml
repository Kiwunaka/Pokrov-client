name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  source-import:
    name: Source import and public tree checks
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python test dependencies
        run: python -m pip install pytest

      - name: Run Python contract tests
        run: python -m pytest tests

      - name: Run operator fixture smoke
        shell: pwsh
        run: .\scripts\run-operator-fixture-smoke.ps1 -Port 18766

      - name: Validate public seed contracts
        shell: pwsh
        run: .\scripts\validate-seed.ps1

      - name: Run OSS import dry-run wrapper
        shell: pwsh
        run: |
          $snapshotArchive = Join-Path $env:RUNNER_TEMP "pokrov-public-snapshot.zip"
          $snapshot = Join-Path $env:RUNNER_TEMP "pokrov-public-snapshot"
          $stage = Join-Path $env:RUNNER_TEMP "pokrov-oss-stage"
          $manifest = Join-Path $env:RUNNER_TEMP "pokrov-oss-manifest.json"
          git archive --format=zip --output=$snapshotArchive HEAD
          Expand-Archive -LiteralPath $snapshotArchive -DestinationPath $snapshot
          .\scripts\prepare-oss-import.ps1 -Source $snapshot -Stage $stage -Manifest $manifest

      - name: Export white-label token smoke
        shell: pwsh
        run: |
          $out = Join-Path $env:RUNNER_TEMP "pokrov-white-label-tokens"
          .\scripts\export-white-label-color-tokens.ps1 -Out $out

      - name: Verify clean clone source boundary
        shell: pwsh
        run: .\scripts\verify-clean-clone.ps1 -Source . -SkipFlutterTests

  flutter:
    name: Flutter analyze and tests
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Bootstrap workspace
        shell: pwsh
        run: .\scripts\bootstrap-workspace.ps1

      - name: Analyze shared app shell
        working-directory: packages/app_shell
        run: flutter analyze

      - name: Run workspace tests
        shell: pwsh
        run: .\scripts\run-tests.ps1
