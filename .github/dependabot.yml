version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "source-boundary"
    commit-message:
      prefix: "deps"
      include: "scope"

  - package-ecosystem: "pub"
    directory: "/apps/android_shell"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:20"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 2
    labels:
      - "dependencies"
      - "android"
    commit-message:
      prefix: "deps(android)"
      include: "scope"

  - package-ecosystem: "pub"
