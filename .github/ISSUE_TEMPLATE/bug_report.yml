name: Bug report
description: Report a public client bug.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Do not include secrets, tokens, QR payloads, subscription URLs, personal connection links, private backend details, or private account data. Do not report vulnerabilities here; use SECURITY.md.
  - type: dropdown
    id: track
    attributes:
      label: Track / variant
      options:
        - Personal Key / Community Client
        - Operator / Company Client
        - Official POKROV Service Mode
        - Repository docs/process
        - Other / not sure
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Android
        - Windows
        - Repository docs/process
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: "0.x.x-beta, commit SHA, or pending source import"
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the issue clearly.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1.
        2.
        3.
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Redact logs and screenshots before attaching them.
