name: Feature request
description: Suggest an improvement for the public client.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Please do not request hidden POKROV backend access, default free VPN/service claims, official node claims for third-party configs, store/stable/trusted-signing claims, or public security details. Do not paste secrets, QR payloads, subscription URLs, personal connection links, or private backend details. Do not report vulnerabilities here; use SECURITY.md.
  - type: dropdown
    id: track
    attributes:
      label: Track / variant
      options:
        - Personal Key / Community Client
        - Operator / Company Client
        - Official POKROV Service Mode
        - Repository docs/process
        - Other / not sure
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should change?
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Android
        - Windows
        - Both
        - Repository docs/process
  - type: textarea
    id: tradeoffs
    attributes:
      label: Tradeoffs or alternatives
      description: What risks, complexity, or alternatives should maintainers consider?
