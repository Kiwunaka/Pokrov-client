name: Build problem
description: Report a problem building from source.
title: "[Build]: "
labels: ["build"]
body:
  - type: markdown
    attributes:
      value: |
        Include the exact command, platform, commit/tag, and whether a clean clone required any private files. Read `docs/TROUBLESHOOTING.md`, then run the read-only contributor doctor with `powershell -ExecutionPolicy Bypass -File .\scripts\doctor.ps1 -Json` and paste redacted output when possible. Do not paste secrets, tokens, QR payloads, subscription URLs, personal connection links, signing files, or private backend details. Do not report vulnerabilities here; use SECURITY.md.
  - type: dropdown
    id: track
    attributes:
      label: Track / variant
      options:
        - Personal Key / Community Client
        - Operator / Company Client
        - Official POKROV Service Mode
        - Repository docs/process
        - Other / not sure
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Android
        - Windows
        - Repository setup
    validations:
      required: true
  - type: input
    id: commit
    attributes:
      label: Commit or tag
  - type: dropdown
    id: troubleshooting
    attributes:
      label: Troubleshooting step tried
      description: Pick the closest step from docs/TROUBLESHOOTING.md.
      options:
        - Ran contributor doctor
        - Checked PowerShell execution policy
        - Checked missing command/toolchain
        - Checked dependency bootstrap
        - Checked Android SDK/Gradle/runtime-artifact boundary
        - Checked Windows Visual Studio/CMake/runtime-artifact boundary
        - Checked clean clone/source-boundary proof
        - Not yet
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command
      description: What command did you run?
      render: shell
  - type: textarea
    id: output
    attributes:
      label: Output
      description: Redact secrets, tokens, paths containing personal data, and private URLs.
      render: text
  - type: textarea
    id: doctor
    attributes:
      label: Contributor doctor output
      description: Run `powershell -ExecutionPolicy Bypass -File .\scripts\doctor.ps1 -Json` and redact local paths, usernames, private URLs, tokens, QR payloads, and subscription URLs before posting.
      render: json
