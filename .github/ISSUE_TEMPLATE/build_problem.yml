name: Build problem
description: Report a problem building from source.
title: "[Build]: "
labels: ["build"]
body:
  - type: markdown
    attributes:
      value: |
        Include the exact command, platform, commit/tag, and whether a clean clone required any private files. Do not paste secrets, tokens, QR payloads, subscription URLs, personal connection links, signing files, or private backend details. Do not report vulnerabilities here; use SECURITY.md.
  - type: dropdown
    id: track
    attributes:
      label: Track / variant
      options:
        - Personal Key / Community Client
        - Operator / Company Client
        - Official POKROV Service Mode
        - Repository docs/process
        - Other / not sure
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Android
        - Windows
        - Repository setup
    validations:
      required: true
  - type: input
    id: commit
    attributes:
      label: Commit or tag
  - type: textarea
    id: command
    attributes:
      label: Command
      description: What command did you run?
      render: shell
  - type: textarea
    id: output
    attributes:
      label: Output
      description: Redact secrets, tokens, paths containing personal data, and private URLs.
      render: text
