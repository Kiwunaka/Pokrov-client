name: Documentation
description: Report unclear, missing, or inaccurate documentation.
title: "[Docs]: "
labels: ["docs"]
body:
  - type: markdown
    attributes:
      value: |
        Do not include secrets, tokens, QR payloads, subscription URLs, personal connection links, private backend details, private operator endpoints, or vulnerability details. Do not add unsupported store, stable, trusted-signing, default free-service, or official POKROV node claims. Do not report vulnerabilities here; use SECURITY.md.
  - type: dropdown
    id: track
    attributes:
      label: Track / variant
      options:
        - Personal Key / Community Client
        - Operator / Company Client
        - Official POKROV Service Mode
        - Repository docs/process
        - Other / not sure
    validations:
      required: true
  - type: input
    id: page
    attributes:
      label: Page or file
      placeholder: "README.en.md, README.ru.md, docs/RELEASE_POLICY.md"
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Documentation area
      options:
        - Public boundary
        - Brand / official build
        - Community client
        - Operator integration
        - Official POKROV service
        - Build / release
        - Other
  - type: textarea
    id: issue
    attributes:
      label: What should be improved?
      description: Describe the gap or confusing wording.
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested wording or direction
      description: Optional, but helpful.
