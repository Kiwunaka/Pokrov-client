<svg width="1040" height="360" viewBox="0 0 1040 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Open-source boundary</title>
  <desc id="desc">Diagram showing the public client repository boundary and the private official service boundary.</desc>
  <defs>
    <linearGradient id="left" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ECFDF5"/>
      <stop offset="1" stop-color="#DBEAFE"/>
    </linearGradient>
    <linearGradient id="right" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#0F766E"/>
    </linearGradient>
  </defs>
  <rect x="1" y="1" width="1038" height="358" rx="30" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="2"/>
  <text x="48" y="56" fill="#0F172A" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="26" font-weight="850">Public source boundary</text>
  <text x="48" y="88" fill="#475569" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="16">Open client code is prepared separately from official service operations.</text>
  <g transform="translate(48 124)">
    <rect width="424" height="188" rx="26" fill="url(#left)" stroke="#A7F3D0"/>
    <text x="32" y="42" fill="#064E3B" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="20" font-weight="850">Open repository</text>
    <text x="32" y="78" fill="#0F172A" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="16">Android client source</text>
    <text x="32" y="108" fill="#0F172A" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="16">Windows client source</text>
    <text x="32" y="138" fill="#0F172A" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="16">Build docs, release notes, checksums</text>
    <text x="32" y="168" fill="#0F172A" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="16">Issues, PRs, security policy</text>
  </g>
  <path d="M500 218H540" stroke="#64748B" stroke-width="3" stroke-linecap="round"/>
  <path d="M528 206L540 218L528 230" stroke="#64748B" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <g transform="translate(568 124)">
    <rect width="424" height="188" rx="26" fill="url(#right)" stroke="#134E4A"/>
    <text x="32" y="42" fill="#ECFDF5" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="20" font-weight="850">Official POKROV service</text>
    <text x="32" y="78" fill="#D1FAE5" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="16">Backend and billing</text>
    <text x="32" y="108" fill="#D1FAE5" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="16">Admin and deployment operations</text>
    <text x="32" y="138" fill="#D1FAE5" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="16">Signing identities and private evidence</text>
    <text x="32" y="168" fill="#D1FAE5" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="16">Official channels and support</text>
  </g>
</svg>
