<svg width="1280" height="420" viewBox="0 0 1280 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">POKROV Client open-source banner</title>
  <desc id="desc">A refined banner for the POKROV Client open-source repository.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#07110F"/>
      <stop offset="0.48" stop-color="#101827"/>
      <stop offset="1" stop-color="#F7F1E8"/>
    </linearGradient>
    <linearGradient id="plate" x1="120" y1="74" x2="1160" y2="346" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.16"/>
      <stop offset="0.58" stop-color="#FFFFFF" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.42"/>
    </linearGradient>
    <linearGradient id="emerald" x1="0" y1="0" x2="1" y2="1">
