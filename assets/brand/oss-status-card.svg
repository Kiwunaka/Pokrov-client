<svg width="1040" height="260" viewBox="0 0 1040 260" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">POKROV Client repository status</title>
  <desc id="desc">Status card showing public foundation, source import pending, and private service boundary.</desc>
  <defs>
    <linearGradient id="card" x1="0" y1="0" x2="1040" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#ECFDF5"/>
    </linearGradient>
  </defs>
  <rect x="1" y="1" width="1038" height="258" rx="28" fill="url(#card)" stroke="#D1D5DB" stroke-width="2"/>
  <text x="48" y="62" fill="#0F172A" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="26" font-weight="800">Repository status</text>
  <text x="48" y="96" fill="#475569" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="16" font-weight="500">A clean public foundation before the sanitized client source import.</text>
  <g transform="translate(48 132)">
    <rect width="208" height="74" rx="18" fill="#0F766E"/>
    <text x="24" y="32" fill="#CCFBF1" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="13" font-weight="800" letter-spacing="1">REPO</text>
    <text x="24" y="56" fill="#FFFFFF" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="18" font-weight="800">public foundation</text>
  </g>
  <g transform="translate(280 132)">
    <rect width="208" height="74" rx="18" fill="#B45309"/>
    <text x="24" y="32" fill="#FEF3C7" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="13" font-weight="800" letter-spacing="1">SOURCE</text>
    <text x="24" y="56" fill="#FFFFFF" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="18" font-weight="800">pending import</text>
  </g>
  <g transform="translate(512 132)">
    <rect width="208" height="74" rx="18" fill="#2563EB"/>
    <text x="24" y="32" fill="#DBEAFE" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="13" font-weight="800" letter-spacing="1">PLATFORMS</text>
    <text x="24" y="56" fill="#FFFFFF" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="18" font-weight="800">Android + Windows</text>
  </g>
  <g transform="translate(744 132)">
    <rect width="248" height="74" rx="18" fill="#111827"/>
    <text x="24" y="32" fill="#D1D5DB" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="13" font-weight="800" letter-spacing="1">SERVICE</text>
    <text x="24" y="56" fill="#FFFFFF" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="18" font-weight="800">POKROV operated</text>
