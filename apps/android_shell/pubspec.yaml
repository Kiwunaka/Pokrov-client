name: pokrov_android_shell
description: Android internal beta host for the POKROV client program.
publish_to: none
version: 1.0.0-beta

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  mobile_scanner: ^7.2.0
  pokrov_app_shell:
    path: ../../packages/app_shell
  pokrov_core_domain:
    path: ../../packages/core_domain
  pokrov_platform_contracts:
    path: ../../packages/platform_contracts
  pokrov_support_context:
    path: ../../packages/support_context

flutter:
  uses-material-design: true
  assets:
    - assets/brand/

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter
